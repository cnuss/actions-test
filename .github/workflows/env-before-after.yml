name: Env before/after extraction

# Posterity: what a `run:` bash shell sees BEFORE vs AFTER the busybox
# docker step injects ACTIONS_* into $GITHUB_ENV. GITHUB_* is unchanged
# (always present); ACTIONS_RESULTS_URL/RUNTIME_TOKEN only appear AFTER.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/env-before-after.yml']

permissions:
  contents: read

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: BEFORE extraction
        shell: bash
        run: |
          echo "===== env | grep ^GITHUB_ (BEFORE) ====="
          env | grep -E '^GITHUB_' | sed -E 's/(TOKEN=).*/\1<redacted>/' | sort
          echo
          echo "===== env | grep ^ACTIONS_ (BEFORE) ====="
          env | grep -E '^ACTIONS_' | sed -E 's/(TOKEN=).*/\1<redacted>/' | sort || echo "(none of interest)"

      - name: Extraction (busybox docker -> $GITHUB_ENV)
        uses: docker://busybox:1.36
        with:
          entrypoint: sh
          args: -c "env | grep -E '^ACTIONS_(RESULTS_URL|RUNTIME_TOKEN)=' >> \"$GITHUB_ENV\""

      - name: AFTER extraction
        shell: bash
        run: |
          echo "===== env | grep ^GITHUB_ (AFTER) ====="
          env | grep -E '^GITHUB_' | sed -E 's/(TOKEN=).*/\1<redacted>/' | sort
          echo
          echo "===== env | grep ^ACTIONS_ (AFTER) ====="
          env | grep -E '^ACTIONS_' | sed -E 's/(TOKEN=).*/\1<redacted>/' | sort
