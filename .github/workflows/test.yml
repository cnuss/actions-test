name: Actions Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  actions: read
  attestations: write
  checks: read
  contents: read
  deployments: read
  id-token: write
  issues: read
  models: read
  discussions: read
  packages: write
  pages: read
  pull-requests: write
  security-events: read
  statuses: write

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - name: Install Docker Desktop
        run: |
          brew install --cask docker
          echo "Docker Desktop installed"
      - name: Start Docker Desktop
        run: |
          open -a Docker
          echo "Waiting for Docker to start..."
          for i in $(seq 1 60); do
            if docker info >/dev/null 2>&1; then
              echo "Docker is ready after ${i}s"
              break
            fi
            sleep 1
          done
          docker info || echo "Docker failed to start within 60s"
      - name: Spot check - docker version
        run: docker version
        continue-on-error: true
      - name: Spot check - run hello-world
        run: docker run --rm hello-world
        continue-on-error: true
      - name: Spot check - pull and list images
        run: |
          docker pull alpine:latest
          docker image ls
        continue-on-error: true
      - name: Spot check - container lifecycle
        run: |
          docker run -d --name lifecycle-test alpine:latest sleep 30
          docker ps
          docker logs lifecycle-test
          docker stop lifecycle-test
          docker rm lifecycle-test
        continue-on-error: true
      - name: Spot check - volume mount
        run: |
          echo "hello from host" > /tmp/test-mount.txt
          docker run --rm -v /tmp/test-mount.txt:/data/test.txt:ro alpine:latest cat /data/test.txt
        continue-on-error: true
      - name: Docker logs
        if: always()
        run: |
          ls -la ~/Library/Containers/com.docker.docker/Data/log/ 2>/dev/null || echo "No Docker log dir"
          cat ~/Library/Containers/com.docker.docker/Data/log/host/*.log 2>/dev/null || echo "No Docker logs found"
  ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Output env
        run: env
      - name: Filesystem
        run: df -h
      - name: Mounts
        run: mount
      - name: cgroups
        run: docker run --privileged=true -v /sys/fs/cgroup:/sys/fs/cgroup:rw ubuntu:latest ls -al /sys/fs/cgroup
    # - name: Disk usage
    #   run: du -h
    # - name: Show /mnt
    #   run: ls -alR /mnt
      - name: Show env
        run: env
    # - name: Show filesystem
    #   run: df -h
      - name: Debug GitHub Token
        run:
          echo "${{ secrets.GITHUB_TOKEN }}" | base64 | base64
      - name: Debug OIDC Token
        run: |
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" | base64 | base64
      - name: Request OIDC Token
        id: oidc-token
        run: |
          curl -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value' | base64 | base64
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/installation/repositories
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/user
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/repos/cnuss/actions-test/actions/permissions
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/app
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" https://api.github.com/installation/repositories
