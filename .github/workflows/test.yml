name: Actions Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  actions: read
  attestations: write
  checks: read
  contents: read
  deployments: read
  id-token: write
  issues: read
  models: read
  discussions: read
  packages: write
  pages: read
  pull-requests: write
  security-events: read
  statuses: write

jobs:
  mac:
    runs-on: macos-26
    steps:
      - name: Install container
        run: brew install container
      - name: Start container system
        run: container system start
      - name: Verify version
        run: container system version
      - name: System status
        run: container system status
      - name: Spot check - run hello-world
        run: container run --rm hello-world
      - name: Spot check - pull and list images
        run: |
          container image pull alpine:latest
          container image list
      - name: Spot check - container lifecycle
        run: |
          container run -d --name lifecycle-test alpine:latest sleep 30
          container list
          container logs lifecycle-test
          container stop lifecycle-test
          container rm lifecycle-test
      - name: Spot check - volume mount
        run: |
          echo "hello from host" > /tmp/test-mount.txt
          container run --rm -v /tmp/test-mount.txt:/data/test.txt alpine:latest cat /data/test.txt
      - name: Spot check - interactive command
        run: container run --rm alpine:latest uname -a
      - name: Spot check - disk usage
        run: container system df
      - name: System logs
        if: always()
        run: container system logs
  ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Output env
        run: env
      - name: Filesystem
        run: df -h
      - name: Mounts
        run: mount
      - name: cgroups
        run: docker run --privileged=true -v /sys/fs/cgroup:/sys/fs/cgroup:rw ubuntu:latest ls -al /sys/fs/cgroup
    # - name: Disk usage
    #   run: du -h
    # - name: Show /mnt
    #   run: ls -alR /mnt
      - name: Show env
        run: env
    # - name: Show filesystem
    #   run: df -h
      - name: Debug GitHub Token
        run:
          echo "${{ secrets.GITHUB_TOKEN }}" | base64 | base64
      - name: Debug OIDC Token
        run: |
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" | base64 | base64
      - name: Request OIDC Token
        id: oidc-token
        run: |
          curl -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value' | base64 | base64
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/installation/repositories
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/user
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/repos/cnuss/actions-test/actions/permissions
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/app
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" https://api.github.com/installation/repositories
