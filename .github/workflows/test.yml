name: Actions Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  lima-on-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Install Lima
        run: |
          LIMA_VERSION=2.1.0
          curl -fsSL https://github.com/lima-vm/lima/releases/download/v${LIMA_VERSION}/lima-${LIMA_VERSION}-Linux-x86_64.tar.gz | sudo tar xzf - -C /usr/local
          limactl --version
      - name: Start default VM
        run: limactl start --name=default --tty=false
        timeout-minutes: 10
      - name: Verify VM is running
        run: limactl list
      - name: Run uname in VM
        run: limactl shell default uname -a
      - name: Run cat /etc/os-release in VM
        run: limactl shell default cat /etc/os-release
