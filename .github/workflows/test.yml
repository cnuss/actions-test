name: Actions Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  lima-on-ubuntu:
    runs-on: macos-26-large
    steps:
      - name: Install Lima
        run: brew install --HEAD lima
      - name: Start homebrew-macos VM
        run: limactl start template:homebrew-macos --tty=false
        timeout-minutes: 30
      - name: Verify VM is running
        run: limactl list
      - name: Run uname in VM
        run: limactl shell homebrew-macos uname -a
