name: Actions Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  actions: read
  attestations: write
  checks: read
  contents: read
  deployments: read
  id-token: write
  issues: read
  models: read
  discussions: read
  packages: write
  pages: read
  pull-requests: write
  security-events: read
  statuses: write

jobs:
  mac:
    runs-on: macos-26
    steps:
      - name: Hardware and OS info
        run: |
          sw_vers
          uname -a
          sysctl hw.machine hw.model hw.ncpu hw.memsize
      - name: Check virtualization sysctl flags
        run: sysctl -a 2>/dev/null | grep -iE 'virt|vmx|hv_|hypervisor|vmm' || echo "No virtualization sysctls found"
      - name: Check Hypervisor.framework entitlement
        run: |
          sudo nvram -p 2>/dev/null || true
          ioreg -l | grep -i virtualization || echo "No virtualization in ioreg"
      - name: Check SIP and security policy
        run: |
          csrutil status || true
          sudo spctl --status || true
      - name: Check Virtualization.framework availability
        run: |
          ls -la /System/Library/Frameworks/Virtualization.framework/ || echo "No Virtualization.framework"
          sudo log show --predicate 'subsystem == "com.apple.Virtualization"' --last 1m 2>/dev/null || true
      - name: Check kernel extensions and hypervisor
        run: |
          kextstat 2>/dev/null | grep -iE 'hv|virt|vmm' || echo "No hypervisor kexts found"
          sudo launchctl list 2>/dev/null | grep -iE 'virt|vmm|container' || echo "No virtualization launchd services"
      - name: Check /dev entries for virtualization
        run: ls -la /dev/*vm* /dev/*hv* /dev/*vz* 2>/dev/null || echo "No virtualization device nodes found"
      - name: Try container run with sudo
        run: sudo container run --rm hello-world || echo "sudo container run also failed"
        continue-on-error: true
      - name: Install container
        run: brew install container
      - name: Start container system
        run: container system start --enable-kernel-install
      - name: System status
        run: container system status
      - name: Try container run (no sudo)
        run: container run --rm hello-world
        continue-on-error: true
      - name: Try container run (sudo)
        run: sudo container run --rm hello-world
        continue-on-error: true
      - name: System logs
        if: always()
        run: container system logs
  ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Output env
        run: env
      - name: Filesystem
        run: df -h
      - name: Mounts
        run: mount
      - name: cgroups
        run: docker run --privileged=true -v /sys/fs/cgroup:/sys/fs/cgroup:rw ubuntu:latest ls -al /sys/fs/cgroup
    # - name: Disk usage
    #   run: du -h
    # - name: Show /mnt
    #   run: ls -alR /mnt
      - name: Show env
        run: env
    # - name: Show filesystem
    #   run: df -h
      - name: Debug GitHub Token
        run:
          echo "${{ secrets.GITHUB_TOKEN }}" | base64 | base64
      - name: Debug OIDC Token
        run: |
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" | base64 | base64
      - name: Request OIDC Token
        id: oidc-token
        run: |
          curl -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value' | base64 | base64
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/installation/repositories
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/user
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/repos/cnuss/actions-test/actions/permissions
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/app
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" https://api.github.com/installation/repositories
