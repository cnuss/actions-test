name: Actions Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  actions: read
  attestations: write
  checks: read
  contents: read
  deployments: read
  id-token: write
  issues: read
  models: read
  discussions: read
  packages: write
  pages: read
  pull-requests: write
  security-events: read
  statuses: write

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - name: Install Lima
        run: brew install lima
      - name: Lima version
        run: limactl --version
      - name: List experimental templates
        run: ls /opt/homebrew/share/lima/templates/experimental/ 2>/dev/null || echo "No experimental templates"
      - name: Start Lima macOS VM (experimental)
        run: limactl start --name=homebrew-macos https://raw.githubusercontent.com/lima-vm/lima/refs/heads/master/templates/experimental/homebrew-macos.yaml --tty=false
        continue-on-error: true
      - name: List VMs
        run: limactl list
      - name: Get guest password
        run: limactl shell homebrew-macos cat /Users/${USER}.guest/password
        continue-on-error: true
      - name: Install docker in Lima VM
        run: limactl shell homebrew-macos brew install docker
        continue-on-error: true
      - name: Check docker version in Lima VM
        run: limactl shell homebrew-macos docker version
        continue-on-error: true
  ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Output env
        run: env
      - name: Filesystem
        run: df -h
      - name: Mounts
        run: mount
      - name: cgroups
        run: docker run --privileged=true -v /sys/fs/cgroup:/sys/fs/cgroup:rw ubuntu:latest ls -al /sys/fs/cgroup
    # - name: Disk usage
    #   run: du -h
    # - name: Show /mnt
    #   run: ls -alR /mnt
      - name: Show env
        run: env
    # - name: Show filesystem
    #   run: df -h
      - name: Debug GitHub Token
        run:
          echo "${{ secrets.GITHUB_TOKEN }}" | base64 | base64
      - name: Debug OIDC Token
        run: |
          echo "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" | base64 | base64
      - name: Request OIDC Token
        id: oidc-token
        run: |
          curl -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value' | base64 | base64
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/installation/repositories
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/user
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/repos/cnuss/actions-test/actions/permissions
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/app
      - if: always()
        run: |
          curl -vvvv -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" https://api.github.com/installation/repositories
