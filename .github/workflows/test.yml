name: Actions Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  actions: read
  attestations: write
  checks: read
  contents: read
  deployments: read
  id-token: write
  issues: read
  models: read
  discussions: read
  packages: write
  pages: read
  pull-requests: write
  security-events: read
  statuses: write

jobs:
  macos-on-ubuntu:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check KVM availability
        run: |
          ls -la /dev/kvm
          uname -m
      - name: Install Lima
        run: |
          LIMA_VERSION=2.1.0
          curl -fsSL https://github.com/lima-vm/lima/releases/download/v${LIMA_VERSION}/lima-${LIMA_VERSION}-Linux-aarch64.tar.gz | sudo tar xzf - -C /usr/local
      - name: Lima version
        run: limactl --version
      - name: Create macOS VM config
        run: |
          cat > /tmp/macos.yaml << 'YAML'
          images:
          - location: "https://updates.cdn-apple.com/2026WinterFCS/fullrestores/047-88313/2E098049-1731-4415-A206-546D09301973/UniversalMac_26.3.1_25D2128_Restore.ipsw"
            arch: "aarch64"
            digest: "sha256:4ff171ba3fa6db4758a2a7cedc8f24d44f4e3de8051a84400984872619abd6bc"
          os: Darwin
          arch: aarch64
          vmType: qemu
          cpus: 2
          memory: 4GiB
          disk: 30GiB
          video:
            display: "none"
          YAML
      - name: Start macOS VM
        run: limactl start --name=macos /tmp/macos.yaml --tty=false
        timeout-minutes: 15
        continue-on-error: true
      - name: List VMs
        if: always()
        run: limactl list
      - name: Check VM status
        if: always()
        run: limactl shell macos uname -a
        continue-on-error: true
      - name: Lima logs
        if: always()
        run: |
          cat ~/.lima/macos/*.log 2>/dev/null || echo "No Lima logs found"
          ls -laR ~/.lima/macos/ 2>/dev/null || echo "No Lima dir"
