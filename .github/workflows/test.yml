name: Actions Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  docker-on-macos:
    runs-on: macos-26-xlarge
    steps:
      - name: Install Docker Desktop
        run: brew install --cask docker
      - name: Install Docker privileged helpers
        run: sudo /Applications/Docker.app/Contents/MacOS/Docker --unattended --install-privileged-components
      - name: Start Docker Desktop with log tailing
        run: |
          mkdir -p ~/Library/Containers/com.docker.docker/Data/log/host
          touch ~/Library/Containers/com.docker.docker/Data/log/host/Docker.log
          tail -f ~/Library/Containers/com.docker.docker/Data/log/host/*.log &
          sudo log stream --predicate 'process == "Docker" OR process == "com.docker.vmnetd" OR process == "Docker Desktop" OR process == "com.docker.backend"' &
          open /Applications/Docker.app
          echo "Waiting for Docker to start..."
          for i in $(seq 1 180); do
            if docker info >/dev/null 2>&1; then
              echo "Docker is ready after ${i}s"
              break
            fi
            sleep 1
          done
          docker info
        timeout-minutes: 5
      - name: docker version
        run: docker version
      - name: Run hello-world
        run: docker run --rm hello-world
      - name: Container lifecycle
        run: |
          docker run -d --name lifecycle-test alpine:latest sleep 30
          docker ps
          docker stop lifecycle-test
          docker rm lifecycle-test
      - name: Docker Desktop logs
        if: always()
        run: |
          cat ~/Library/Containers/com.docker.docker/Data/log/host/*.log 2>/dev/null || echo "No host logs"
          sudo find ~/Library -path '*Docker*' -name '*.log' 2>/dev/null | head -20
