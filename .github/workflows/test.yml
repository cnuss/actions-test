name: Actions Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  docker-on-macos:
    runs-on: macos-26-xlarge
    steps:
      - name: Install Docker Desktop
        run: brew install --cask docker
      - name: Start Docker Desktop
        run: |
          open /Applications/Docker.app
          echo "Waiting for Docker to start..."
          for i in $(seq 1 120); do
            if docker info >/dev/null 2>&1; then
              echo "Docker is ready after ${i}s"
              break
            fi
            sleep 1
          done
          docker info
      - name: docker version
        run: docker version
      - name: Run hello-world
        run: docker run --rm hello-world
      - name: Container lifecycle
        run: |
          docker run -d --name lifecycle-test alpine:latest sleep 30
          docker ps
          docker stop lifecycle-test
          docker rm lifecycle-test
      - name: Docker Desktop logs
        if: always()
        run: |
          ls -la ~/Library/Containers/com.docker.docker/Data/log/ 2>/dev/null || echo "No Docker log dir"
          sudo find /var/log -name '*docker*' -o -name '*Docker*' 2>/dev/null || echo "No docker in /var/log"
          sudo find ~/Library -path '*/Docker*' -name '*.log' 2>/dev/null | head -20
          cat ~/Library/Containers/com.docker.docker/Data/log/host/*.log 2>/dev/null || echo "No host logs"
          sudo log show --predicate 'process == "Docker" OR process == "com.docker.vmnetd" OR process == "Docker Desktop"' --last 5m 2>/dev/null || echo "No system log entries"
