name: Docker via Colima (QEMU TCG)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  docker-colima-tcg:
    runs-on: macos-26-xlarge
    timeout-minutes: 30
    steps:
      - name: Check hypervisor support
        run: |
          sysctl kern.hv_support 2>&1 || true
          uname -m
          sysctl machdep.cpu.brand_string

      - name: Install QEMU, colima, and Docker CLI
        run: brew install qemu colima docker

      - name: Wrap QEMU to force TCG
        run: |
          QEMU_BIN="/opt/homebrew/bin/qemu-system-aarch64"
          sudo mv "$QEMU_BIN" "${QEMU_BIN}.real"
          cat > /tmp/qemu-wrapper.sh << 'WRAPPER'
          #!/bin/bash
          args=()
          for arg in "$@"; do
            arg="${arg//accel=hvf/accel=tcg}"
            args+=("$arg")
          done
          final=()
          for i in "${!args[@]}"; do
            if [[ "${args[$i]}" == "host" && $i -gt 0 && "${args[$((i-1))]}" == "-cpu" ]]; then
              final+=("max")
            else
              final+=("${args[$i]}")
            fi
          done
          exec /opt/homebrew/bin/qemu-system-aarch64.real "${final[@]}"
          WRAPPER
          sudo mv /tmp/qemu-wrapper.sh "$QEMU_BIN"
          sudo chmod +x "$QEMU_BIN"

      - name: Start colima
        run: colima start --vm-type qemu --cpu 4 --memory 4 --disk 20
        timeout-minutes: 15

      - name: Docker info
        run: docker info

      - name: Docker version
        run: docker version

      - name: Run hello-world
        run: docker run --rm hello-world

      - name: Container lifecycle
        run: |
          docker run -d --name lifecycle-test alpine:latest sleep 30
          docker ps
          docker stop lifecycle-test
          docker rm lifecycle-test

      - name: Colima status
        if: always()
        run: colima status || true

      - name: QEMU serial log
        if: failure()
        run: cat ~/.colima/_lima/colima/serial*.log 2>/dev/null || echo "No serial logs found"

      - name: Lima hostagent log
        if: failure()
        run: cat ~/.colima/_lima/colima/ha.stderr.log 2>/dev/null || echo "No hostagent logs found"

      - name: Cleanup
        if: always()
        run: colima stop --force 2>/dev/null || true
