name: Docker via QEMU TCG

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  docker-qemu-tcg:
    runs-on: macos-26-xlarge
    timeout-minutes: 30
    steps:
      - name: Check hypervisor support
        run: |
          sysctl kern.hv_support 2>&1 || true
          sysctl kern.hv 2>&1 || true
          uname -m
          sysctl machdep.cpu.brand_string

      - name: Install QEMU, colima, and Docker CLI
        run: brew install qemu colima docker

      - name: Check QEMU accelerators
        run: |
          qemu-system-aarch64 --accel help
          qemu-system-aarch64 --version

      - name: Test raw QEMU TCG boot
        run: |
          qemu-system-aarch64 \
            -M virt \
            -accel tcg \
            -cpu max \
            -m 512 \
            -nographic \
            -no-reboot \
            -bios /opt/homebrew/share/qemu/edk2-aarch64-code.fd \
            -serial mon:stdio &
          QEMU_PID=$!
          sleep 5
          kill $QEMU_PID 2>/dev/null || true
          echo "QEMU TCG process ran successfully (PID $QEMU_PID)"

      - name: Start colima with QEMU
        run: colima start --vm-type qemu --cpu 4 --memory 4 --disk 20 --verbose
        timeout-minutes: 10

      - name: Docker info
        run: docker info

      - name: Docker version
        run: docker version

      - name: Run hello-world
        run: docker run --rm hello-world

      - name: Container lifecycle
        run: |
          docker run -d --name lifecycle-test alpine:latest sleep 30
          docker ps
          docker stop lifecycle-test
          docker rm lifecycle-test

      - name: Colima status
        if: always()
        run: colima status --verbose || true

      - name: QEMU serial log
        if: failure()
        run: cat ~/.colima/_lima/colima/serial*.log 2>/dev/null || echo "No serial logs found"

      - name: Lima hostagent log
        if: failure()
        run: cat ~/.colima/_lima/colima/ha.stderr.log 2>/dev/null || echo "No hostagent logs found"
