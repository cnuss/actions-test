name: Docker via QEMU TCG

on:
  workflow_dispatch:

jobs:
  docker-qemu-tcg:
    runs-on: macos-26-xlarge
    timeout-minutes: 30
    steps:
      - name: Check hypervisor support
        run: |
          sysctl kern.hv_support 2>&1 || true
          uname -m
          sysctl machdep.cpu.brand_string

      - name: Install QEMU, Lima, and Docker CLI
        run: brew install qemu lima

      - name: Wrap QEMU to force TCG
        run: |
          QEMU_BIN="/opt/homebrew/bin/qemu-system-aarch64"
          sudo mv "$QEMU_BIN" "${QEMU_BIN}.real"
          cat > /tmp/qemu-wrapper.sh << 'WRAPPER'
          #!/bin/bash
          args=()
          for arg in "$@"; do
            arg="${arg//accel=hvf/accel=tcg}"
            args+=("$arg")
          done
          final=()
          for i in "${!args[@]}"; do
            if [[ "${args[$i]}" == "host" && $i -gt 0 && "${args[$((i-1))]}" == "-cpu" ]]; then
              final+=("max")
            else
              final+=("${args[$i]}")
            fi
          done
          exec /opt/homebrew/bin/qemu-system-aarch64.real "${final[@]}"
          WRAPPER
          sudo mv /tmp/qemu-wrapper.sh "$QEMU_BIN"
          sudo chmod +x "$QEMU_BIN"
          echo "Wrapper installed. Verifying:"
          cat "$QEMU_BIN"

      - name: Verify wrapper works
        run: |
          qemu-system-aarch64 --version
          qemu-system-aarch64 --accel help

      - name: Start Lima with Docker
        run: |
          cat > /tmp/docker-tcg.yaml << 'YAML'
          images:
            - location: https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-arm64.img
              arch: aarch64
          cpus: 4
          memory: 4GiB
          disk: 20GiB
          provision:
            - mode: system
              script: |
                #!/bin/bash
                set -eux
                export DEBIAN_FRONTEND=noninteractive
                curl -fsSL https://get.docker.com | sh
                systemctl enable --now docker
                usermod -aG docker "${LIMA_CIDATA_USER}"
          YAML
          limactl start --vm-type qemu --name docker-tcg /tmp/docker-tcg.yaml --tty=false
        timeout-minutes: 15

      - name: Lima instance info
        if: always()
        run: limactl list

      - name: Docker info via Lima
        run: limactl shell docker-tcg -- sudo docker info

      - name: Run hello-world
        run: limactl shell docker-tcg -- sudo docker run --rm hello-world

      - name: Container lifecycle
        run: |
          limactl shell docker-tcg -- sudo docker run -d --name lifecycle-test alpine:latest sleep 30
          limactl shell docker-tcg -- sudo docker ps
          limactl shell docker-tcg -- sudo docker stop lifecycle-test
          limactl shell docker-tcg -- sudo docker rm lifecycle-test

      - name: QEMU serial log
        if: failure()
        run: cat ~/.lima/docker-tcg/serial*.log 2>/dev/null || echo "No serial logs found"

      - name: Lima hostagent log
        if: failure()
        run: cat ~/.lima/docker-tcg/ha.stderr.log 2>/dev/null || echo "No hostagent logs found"

      - name: Cleanup
        if: always()
        run: limactl stop docker-tcg --force 2>/dev/null || true
