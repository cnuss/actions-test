name: Probe docker inline

# Fully node-free bootstrap: step-level `uses: docker://busybox` (no checkout,
# no local action file). Does the runner split with.args into argv correctly?

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/probe-docker-inline.yml']

permissions:
  contents: read

jobs:
  inline:
    runs-on: ubuntu-latest
    steps:
      - name: Leak env (inline docker:// busybox, no checkout)
        uses: docker://busybox:1.36
        with:
          entrypoint: sh
          args: -c "env | grep -E '^ACTIONS_(RESULTS_URL|CACHE_URL|RUNTIME_URL|RUNTIME_TOKEN)=' >> \"$GITHUB_ENV\"; echo wrote $(grep -c ACTIONS_ \"$GITHUB_ENV\") ACTIONS_ lines"

      - name: Confirm in bash (no node anywhere in this job)
        shell: bash
        run: |
          set -euo pipefail
          echo "RESULTS_URL = ${ACTIONS_RESULTS_URL:-<missing>}"
          echo "CACHE_URL   = ${ACTIONS_CACHE_URL:-<missing>}"
          [ -n "${ACTIONS_RUNTIME_TOKEN:-}" ] && echo "RUNTIME_TOKEN = <present>" || echo "RUNTIME_TOKEN = <missing>"
