name: Probe env source

# Diagnostic: where does ACTIONS_RESULTS_URL / ACTIONS_RUNTIME_TOKEN live,
# and can pure bash reach it without actions/github-script?

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/probe-env-source.yml']

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe in pure bash
        shell: bash
        run: |
          set +e
          echo "===== 1. what ACTIONS_* vars does a run: shell already see? ====="
          env | grep -E '^ACTIONS_' | sed -E 's/(TOKEN=).*/\1<redacted>/' | sort

          echo; echo "===== 2. yama ptrace_scope ====="
          cat /proc/sys/kernel/yama/ptrace_scope 2>&1

          echo; echo "===== 3. process tree (who is my ancestor?) ====="
          ps -o pid,ppid,user,comm,args -e | grep -iE 'Runner|node|bash' | grep -v grep | head -40

          echo; echo "===== 4. my pid + ancestry ====="
          echo "self=$$"
          pid=$$
          for i in 1 2 3 4 5 6; do
            read -r ppid comm < <(awk '{print $4, $2}' /proc/$pid/stat 2>/dev/null)
            echo "  pid=$pid comm=$comm ppid=$ppid"
            pid=$ppid
            [ "$pid" = "0" ] && break
          done

          echo; echo "===== 5. try reading Runner.Worker /proc environ for the URLs ====="
          for p in $(pgrep -f 'Runner.Worker' 2>/dev/null) $(pgrep -f 'Runner.Listener' 2>/dev/null); do
            echo "-- pid $p ($(cat /proc/$p/comm 2>/dev/null)) --"
            if tr '\0' '\n' < /proc/$p/environ 2>/dev/null | grep -E '^ACTIONS_(RESULTS_URL|CACHE_URL|RUNTIME_URL)=' ; then
              echo "  [readable: URLs above]"
            else
              echo "  [environ NOT readable: $? ]"
            fi
          done

          echo; echo "===== 6. brute scan all readable /proc/*/environ for ACTIONS_RESULTS_URL ====="
          found=""
          for e in /proc/[0-9]*/environ; do
            if val=$(tr '\0' '\n' < "$e" 2>/dev/null | grep -E '^ACTIONS_RESULTS_URL='); then
              echo "  $e -> $val"; found=1
            fi
          done
          [ -z "$found" ] && echo "  none readable"
          true
